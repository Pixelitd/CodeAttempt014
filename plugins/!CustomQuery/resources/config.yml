## Welcome to CustomQuery plugin configurations, where you can configure
## the way you handle Queries.

show-plugins: false
### This option allows you to toggle on/off showing plugins (By defaulted, and in which are real).
## If this option is set to false, it will show up fake plugins (If fake-plugins option is set to true.)
## If this option is set to true, then it'll show real plugins, and may possibly overwrite fake-plugins, or overwrite one and another.
## It's best to keep one of the options "show-plugins" or "fake-plugins" to either true or false.
## Make sure they're not the same option just in case it does overwrite.
### Plugin / config options:


fake-plugins: true
## List your plugins on the servers list websites.

set-plugins: []
## If list-plugins option is set to true, customize which plugins should be shown / displayed.

infinity-slots: false
## If this option is set to true, the max players slots will be 1 above the player count that is currently online. So it'd look like this: 0/1. If one person joined, it'll be 1/2, etc.

fake-slots: false
## Allows you to fake your player slots.

min-slots: 10
## From first player slot (which is minimum) and then the maximum of slots it can go up to via fake querying it.

max-slots: 1000
